name: Desktop Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (desktop mode)
        run: pnpm --filter @nomi/web build:desktop
        env:
          ALLOW_LOCALHOST_IN_PROD_BUILD: '1'

      - name: Build backend
        run: pnpm --filter @nomi/api build

      - name: Generate desktop Prisma client
        run: pnpm --filter @nomi/api prisma:generate:desktop

      - name: Install desktop dependencies
        run: pnpm --filter @nomi/desktop install

      - name: Build desktop main process
        run: pnpm --filter @nomi/desktop build

      - name: Build & publish (macOS)
        run: pnpm --filter @nomi/desktop dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 代码签名（可选，无证书时跳过）
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # macOS 公证（可选）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # 无证书时禁用自动签名查找，有证书时设为 true
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CSC_LINK != '' }}

  build-win:
    name: Build Windows
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (desktop mode)
        run: pnpm --filter @nomi/web build:desktop
        env:
          ALLOW_LOCALHOST_IN_PROD_BUILD: '1'

      - name: Build backend
        run: pnpm --filter @nomi/api build

      - name: Generate desktop Prisma client
        run: pnpm --filter @nomi/api prisma:generate:desktop

      - name: Install desktop dependencies
        run: pnpm --filter @nomi/desktop install

      - name: Build desktop main process
        run: pnpm --filter @nomi/desktop build

      - name: Build & publish (Windows)
        run: pnpm --filter @nomi/desktop dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows 代码签名（可选）
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

  publish-aliases:
    name: Publish stable download aliases
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download original release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p aliases
          gh release download "${{ steps.meta.outputs.tag }}" \
            -R "${{ github.repository }}" \
            -p "Nomi-${{ steps.meta.outputs.version }}-arm64.dmg" \
            -p "Nomi-${{ steps.meta.outputs.version }}.dmg" \
            -p "Nomi-Setup-${{ steps.meta.outputs.version }}.exe" \
            -D aliases

      - name: Create stable-name copies
        run: |
          cp "aliases/Nomi-${{ steps.meta.outputs.version }}-arm64.dmg" "aliases/Nomi-mac-arm64.dmg"
          cp "aliases/Nomi-${{ steps.meta.outputs.version }}.dmg"       "aliases/Nomi-mac-intel.dmg"
          cp "aliases/Nomi-Setup-${{ steps.meta.outputs.version }}.exe" "aliases/Nomi-windows-setup.exe"

      - name: Upload aliases to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            -R "${{ github.repository }}" \
            aliases/Nomi-mac-arm64.dmg \
            aliases/Nomi-mac-intel.dmg \
            aliases/Nomi-windows-setup.exe \
            --clobber
