name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install web dependencies
        run: pnpm --filter @nomi/web install --frozen-lockfile

      - name: Verify web build tools
        run: pnpm --filter @nomi/web exec vite --version

      - name: Build web app
        run: pnpm build:web
        env:
          ALLOW_LOCALHOST_IN_PROD_BUILD: "1"
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://localhost:8788' }}
          VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID || 'ci-local-dev' }}
          VITE_GITHUB_REDIRECT_URI: ${{ vars.VITE_GITHUB_REDIRECT_URI || 'http://localhost:5173/oauth/github' }}

      - name: Build API
        run: pnpm build:api

      - name: Build agents
        run: pnpm build:agents

      - name: Test API
        run: pnpm --filter @nomi/api test

      - name: Test web
        run: pnpm --filter @nomi/web test
